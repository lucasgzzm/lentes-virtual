<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b00;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#1a0f00;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0d0800;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513"/>
      <stop offset="25%" style="stop-color:#a0522d"/>
      <stop offset="50%" style="stop-color:#cd853f"/>
      <stop offset="75%" style="stop-color:#8b4513"/>
      <stop offset="100%" style="stop-color:#a0522d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Temple arms -->
  <path d="M 75 68 L 15 62" stroke="url(#shellGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 325 68 L 385 62" stroke="url(#shellGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Left lens (cat-eye shape with upswept corners) -->
  <path d="M 95 55 Q 95 35 115 30 Q 140 25 160 35 Q 175 45 180 55 L 185 75 Q 185 105 160 115 Q 135 120 115 110 Q 95 100 90 75 Z" 
        fill="url(#lensGrad)" stroke="url(#shellGrad)" stroke-width="6" stroke-linejoin="round" filter="url(#shadow)"/>
  
  <!-- Right lens (cat-eye shape with upswept corners) -->
  <path d="M 305 55 Q 305 35 285 30 Q 260 25 240 35 Q 225 45 220 55 L 215 75 Q 215 105 240 115 Q 265 120 285 110 Q 305 100 310 75 Z" 
        fill="url(#lensGrad)" stroke="url(#shellGrad)" stroke-width="6" stroke-linejoin="round" filter="url(#shadow)"/>
  
  <!-- Cat-eye decorative points -->
  <path d="M 92 52 L 80 42 L 95 50" fill="url(#shellGrad)" stroke="url(#shellGrad)" stroke-width="1"/>
  <path d="M 308 52 L 320 42 L 305 50" fill="url(#shellGrad)" stroke="url(#shellGrad)" stroke-width="1"/>
  
  <!-- Bridge -->
  <path d="M 185 68 Q 200 58 215 68" stroke="url(#shellGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose pads -->
  <ellipse cx="186" cy="82" rx="3" ry="5" fill="#a0522d"/>
  <ellipse cx="214" cy="82" rx="3" ry="5" fill="#a0522d"/>
  
  <!-- Hinge details -->
  <rect x="78" y="62" width="6" height="6" rx="1" fill="#cd853f"/>
  <rect x="316" y="62" width="6" height="6" rx="1" fill="#cd853f"/>
</svg>