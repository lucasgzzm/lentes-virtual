<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <!-- Left lens gradient -->
    <linearGradient id="lensL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="35%" stop-color="#2c2c2c"/>
      <stop offset="60%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <!-- Right lens gradient -->
    <linearGradient id="lensR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="35%" stop-color="#2c2c2c"/>
      <stop offset="60%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <!-- Gold frame gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d680"/>
      <stop offset="30%" stop-color="#d4a843"/>
      <stop offset="60%" stop-color="#c9952a"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <!-- Lens reflection -->
    <radialGradient id="reflectL" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="reflectR" cx="65%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Temple shadow -->
    <linearGradient id="tshadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.3)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <!-- Clip for teardrop lens shape -->
    <clipPath id="clipL">
      <ellipse cx="120" cy="90" rx="52" ry="55"/>
    </clipPath>
    <clipPath id="clipR">
      <ellipse cx="280" cy="90" rx="52" ry="55"/>
    </clipPath>
  </defs>

  <!-- Temple arms (behind lenses) -->
  <!-- Left temple -->
  <path d="M30,72 L0,68" stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M30,74 L0,70" stroke="rgba(0,0,0,0.15)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right temple -->
  <path d="M370,72 L400,68" stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M370,74 L400,70" stroke="rgba(0,0,0,0.15)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Left lens - teardrop shape -->
  <ellipse cx="120" cy="90" rx="52" ry="55" fill="url(#lensL)" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Left lens reflections -->
  <ellipse cx="120" cy="90" rx="52" ry="55" fill="url(#reflectL)"/>
  <ellipse cx="100" cy="72" rx="18" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(-15,100,72)"/>
  <ellipse cx="135" cy="105" rx="8" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(20,135,105)"/>

  <!-- Right lens - teardrop shape -->
  <ellipse cx="280" cy="90" rx="52" ry="55" fill="url(#lensR)" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Right lens reflections -->
  <ellipse cx="280" cy="90" rx="52" ry="55" fill="url(#reflectR)"/>
  <ellipse cx="295" cy="72" rx="18" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(15,295,72)"/>
  <ellipse cx="265" cy="105" rx="8" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(-20,265,105)"/>

  <!-- Double bridge bar - top -->
  <line x1="170" y1="70" x2="230" y2="70" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <!-- Double bridge bar - bottom -->
  <path d="M172,78 Q200,95 228,78" stroke="url(#gold)" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Nose pads -->
  <ellipse cx="172" cy="92" rx="4" ry="6" fill="url(#gold)" stroke="#b8860b" stroke-width="0.5"/>
  <ellipse cx="228" cy="92" rx="4" ry="6" fill="url(#gold)" stroke="#b8860b" stroke-width="0.5"/>
  <!-- Nose pad arms -->
  <line x1="172" y1="86" x2="168" y2="78" stroke="url(#gold)" stroke-width="1.2"/>
  <line x1="228" y1="86" x2="232" y2="78" stroke="url(#gold)" stroke-width="1.2"/>
</svg>