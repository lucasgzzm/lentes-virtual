<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#daa520"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Temple arms (behind lenses) -->
  <path d="M 60 75 L 10 70" stroke="url(#frameGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 340 75 L 390 70" stroke="url(#frameGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Left lens (teardrop shape) -->
  <path d="M 100 50 Q 100 35 130 30 Q 160 25 180 40 Q 195 55 190 80 Q 185 105 160 115 Q 135 125 115 110 Q 95 95 100 50 Z" 
        fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Right lens (teardrop shape) -->
  <path d="M 300 50 Q 300 35 270 30 Q 240 25 220 40 Q 205 55 210 80 Q 215 105 240 115 Q 265 125 285 110 Q 305 95 300 50 Z" 
        fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Bridge -->
  <path d="M 190 70 Q 200 55 210 70" stroke="url(#frameGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose pads -->
  <ellipse cx="188" cy="80" rx="3" ry="4" fill="#daa520"/>
  <ellipse cx="212" cy="80" rx="3" ry="4" fill="#daa520"/>
  
  <!-- Temple arm details (hinges) -->
  <circle cx="98" cy="72" r="2.5" fill="#ffd700"/>
  <circle cx="302" cy="72" r="2.5" fill="#ffd700"/>
</svg>