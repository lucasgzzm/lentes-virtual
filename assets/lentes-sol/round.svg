<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Temple arms -->
  <line x1="55" y1="80" x2="15" y2="76" stroke="url(#frameGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="345" y1="80" x2="385" y2="76" stroke="url(#frameGrad)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Left lens (circle) -->
  <circle cx="130" cy="80" r="48" fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2.5" filter="url(#shadow)"/>
  
  <!-- Right lens (circle) -->
  <circle cx="270" cy="80" r="48" fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2.5" filter="url(#shadow)"/>
  
  <!-- Bridge -->
  <path d="M 178 75 Q 200 60 222 75" stroke="url(#frameGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose pads -->
  <ellipse cx="175" cy="88" rx="3" ry="4" fill="#daa520"/>
  <ellipse cx="225" cy="88" rx="3" ry="4" fill="#daa520"/>
  
  <!-- Lens reflections -->
  <path d="M 115 60 Q 125 55 135 60" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M 255 60 Q 265 55 275 60" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.15"/>
  
  <!-- Hinge details -->
  <circle cx="82" cy="80" r="2" fill="#ffd700"/>
  <circle cx="318" cy="80" r="2" fill="#ffd700"/>
</svg>