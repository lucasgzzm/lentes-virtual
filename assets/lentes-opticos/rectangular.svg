<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <!-- Clear lens with blue-light tint -->
    <linearGradient id="clearL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(200,220,240,0.12)"/>
      <stop offset="50%" stop-color="rgba(180,210,240,0.06)"/>
      <stop offset="100%" stop-color="rgba(200,220,240,0.1)"/>
    </linearGradient>
    <linearGradient id="clearR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(200,220,240,0.12)"/>
      <stop offset="50%" stop-color="rgba(180,210,240,0.06)"/>
      <stop offset="100%" stop-color="rgba(200,220,240,0.1)"/>
    </linearGradient>
    <!-- Silver metal frame -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="25%" stop-color="#c0c0c0"/>
      <stop offset="50%" stop-color="#a8a8a8"/>
      <stop offset="75%" stop-color="#b8b8b8"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <!-- Blue light reflection -->
    <linearGradient id="bluelight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(100,150,255,0.08)"/>
      <stop offset="50%" stop-color="rgba(100,150,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(100,150,255,0.05)"/>
    </linearGradient>
    <!-- Glare -->
    <radialGradient id="glareL" cx="32%" cy="28%" r="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glareR" cx="68%" cy="28%" r="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Left temple -->
  <path d="M42,72 L0,69" stroke="url(#silver)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M42,73 L0,70" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Right temple -->
  <path d="M358,72 L400,69" stroke="url(#silver)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M358,73 L400,70" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Left lens - rectangular -->
  <rect x="52" y="54" width="110" height="72" rx="6" ry="6" fill="url(#clearL)" stroke="url(#silver)" stroke-width="1.5"/>
  <rect x="52" y="54" width="110" height="72" rx="6" ry="6" fill="url(#bluelight)"/>
  <rect x="52" y="54" width="110" height="72" rx="6" ry="6" fill="url(#glareL)"/>
  <ellipse cx="82" cy="66" rx="18" ry="6" fill="rgba(255,255,255,0.15)" transform="rotate(-3,82,66)"/>
  <!-- Lens edge highlight -->
  <line x1="56" y1="56" x2="158" y2="56" stroke="rgba(200,200,200,0.2)" stroke-width="0.5"/>

  <!-- Right lens - rectangular -->
  <rect x="238" y="54" width="110" height="72" rx="6" ry="6" fill="url(#clearR)" stroke="url(#silver)" stroke-width="1.5"/>
  <rect x="238" y="54" width="110" height="72" rx="6" ry="6" fill="url(#bluelight)"/>
  <rect x="238" y="54" width="110" height="72" rx="6" ry="6" fill="url(#glareR)"/>
  <ellipse cx="318" cy="66" rx="18" ry="6" fill="rgba(255,255,255,0.15)" transform="rotate(3,318,66)"/>
  <line x1="242" y1="56" x2="344" y2="56" stroke="rgba(200,200,200,0.2)" stroke-width="0.5"/>

  <!-- Bridge -->
  <path d="M162,74 Q200,86 238,74" stroke="url(#silver)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Nose pads (thin metal) -->
  <ellipse cx="176" cy="90" rx="3" ry="5" fill="url(#silver)" stroke="#909090" stroke-width="0.5"/>
  <ellipse cx="224" cy="90" rx="3" ry="5" fill="url(#silver)" stroke="#909090" stroke-width="0.5"/>
  <!-- Nose pad arms -->
  <line x1="176" y1="85" x2="172" y2="76" stroke="url(#silver)" stroke-width="1"/>
  <line x1="224" y1="85" x2="228" y2="76" stroke="url(#silver)" stroke-width="1"/>
</svg>