<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f2ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#cce5ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#b3d9ff;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="50%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#a8a8a8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Temple arms -->
  <line x1="68" y1="72" x2="15" y2="68" stroke="url(#frameGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="332" y1="72" x2="385" y2="68" stroke="url(#frameGrad)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Left lens (rectangular) -->
  <rect x="75" y="52" width="115" height="55" rx="4" ry="4" 
        fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Right lens (rectangular) -->
  <rect x="210" y="52" width="115" height="55" rx="4" ry="4" 
        fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Bridge -->
  <path d="M 190 72 L 210 72" stroke="url(#frameGrad)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Nose pads -->
  <ellipse cx="188" cy="82" rx="2.5" ry="3.5" fill="#c0c0c0"/>
  <ellipse cx="212" cy="82" rx="2.5" ry="3.5" fill="#c0c0c0"/>
  
  <!-- Lens reflections -->
  <path d="M 85 62 L 180 62" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <path d="M 220 62 L 315 62" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Hinge details -->
  <rect x="68" y="68" width="7" height="7" rx="1" fill="#d0d0d0"/>
  <rect x="325" y="68" width="7" height="7" rx="1" fill="#d0d0d0"/>
</svg>