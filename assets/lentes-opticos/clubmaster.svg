<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="topFrameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2b1f"/>
      <stop offset="50%" style="stop-color:#2c1810"/>
      <stop offset="100%" style="stop-color:#1a0f0a"/>
    </linearGradient>
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Temple arms -->
  <path d="M 72 65 L 15 60" stroke="url(#topFrameGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 328 65 L 385 60" stroke="url(#topFrameGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Left lens -->
  <!-- Thick top frame -->
  <path d="M 80 50 L 190 50 L 190 65 L 80 65 Z" fill="url(#topFrameGrad)" filter="url(#shadow)"/>
  <!-- Thin wire bottom and sides -->
  <path d="M 80 65 L 80 105 Q 80 115 90 115 L 180 115 Q 190 115 190 105 L 190 65" 
        stroke="url(#wireGrad)" stroke-width="1.5" fill="url(#lensGrad)"/>
  
  <!-- Right lens -->
  <!-- Thick top frame -->
  <path d="M 210 50 L 320 50 L 320 65 L 210 65 Z" fill="url(#topFrameGrad)" filter="url(#shadow)"/>
  <!-- Thin wire bottom and sides -->
  <path d="M 210 65 L 210 105 Q 210 115 220 115 L 310 115 Q 320 115 320 105 L 320 65" 
        stroke="url(#wireGrad)" stroke-width="1.5" fill="url(#lensGrad)"/>
  
  <!-- Bridge -->
  <path d="M 190 60 Q 200 52 210 60" stroke="url(#topFrameGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Nose pads -->
  <ellipse cx="188" cy="80" rx="2.5" ry="4" fill="#c0c0c0"/>
  <ellipse cx="212" cy="80" rx="2.5" ry="4" fill="#c0c0c0"/>
  
  <!-- Lens reflections -->
  <path d="M 95 58 L 175 58" stroke="#ffffff" stroke-width="0.8" opacity="0.15"/>
  <path d="M 225 58 L 305 58" stroke="#ffffff" stroke-width="0.8" opacity="0.15"/>
  
  <!-- Hinge details -->
  <rect x="72" y="58" width="8" height="8" rx="1" fill="#c0c0c0"/>
  <rect x="320" y="58" width="8" height="8" rx="1" fill="#c0c0c0"/>
</svg>