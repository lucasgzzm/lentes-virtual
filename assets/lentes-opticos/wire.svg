<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <!-- Clear lens -->
    <linearGradient id="clearL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(215,220,225,0.06)"/>
      <stop offset="50%" stop-color="rgba(200,210,215,0.03)"/>
      <stop offset="100%" stop-color="rgba(215,220,225,0.06)"/>
    </linearGradient>
    <linearGradient id="clearR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(215,220,225,0.06)"/>
      <stop offset="50%" stop-color="rgba(200,210,215,0.03)"/>
      <stop offset="100%" stop-color="rgba(215,220,225,0.06)"/>
    </linearGradient>
    <!-- Ultra-thin gold wire -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d680"/>
      <stop offset="30%" stop-color="#d4a843"/>
      <stop offset="60%" stop-color="#c9952a"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <!-- Subtle glare -->
    <radialGradient id="glareL" cx="35%" cy="30%" r="28%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glareR" cx="65%" cy="30%" r="28%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Minimal lens edge -->
    <linearGradient id="lensedge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(200,200,200,0.08)"/>
      <stop offset="50%" stop-color="rgba(200,200,200,0)"/>
      <stop offset="100%" stop-color="rgba(200,200,200,0.06)"/>
    </linearGradient>
  </defs>

  <!-- Left temple (ultra-thin) -->
  <path d="M44,74 L0,72" stroke="url(#gold)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Right temple -->
  <path d="M356,74 L400,72" stroke="url(#gold)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Left lens -->
  <circle cx="118" cy="80" r="46" fill="url(#clearL)" stroke="url(#gold)" stroke-width="1"/>
  <circle cx="118" cy="80" r="46" fill="url(#lensedge)"/>
  <circle cx="118" cy="80" r="46" fill="url(#glareL)"/>
  <ellipse cx="104" cy="66" rx="14" ry="6" fill="rgba(255,255,255,0.12)" transform="rotate(-8,104,66)"/>
  <ellipse cx="128" cy="95" rx="4" ry="3" fill="rgba(255,255,255,0.06)"/>

  <!-- Right lens -->
  <circle cx="282" cy="80" r="46" fill="url(#clearR)" stroke="url(#gold)" stroke-width="1"/>
  <circle cx="282" cy="80" r="46" fill="url(#lensedge)"/>
  <circle cx="282" cy="80" r="46" fill="url(#glareR)"/>
  <ellipse cx="292" cy="66" rx="14" ry="6" fill="rgba(255,255,255,0.12)" transform="rotate(8,292,66)"/>
  <ellipse cx="272" cy="95" rx="4" ry="3" fill="rgba(255,255,255,0.06)"/>

  <!-- Delicate bridge -->
  <path d="M163,76 Q200,88 237,76" stroke="url(#gold)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Nose pads (tiny, delicate) -->
  <ellipse cx="178" cy="90" rx="2.5" ry="4" fill="url(#gold)" stroke="#b8860b" stroke-width="0.3"/>
  <ellipse cx="222" cy="90" rx="2.5" ry="4" fill="url(#gold)" stroke="#b8860b" stroke-width="0.3"/>
  <!-- Nose pad arms -->
  <line x1="178" y1="86" x2="174" y2="78" stroke="url(#gold)" stroke-width="0.6"/>
  <line x1="222" y1="86" x2="226" y2="78" stroke="url(#gold)" stroke-width="0.6"/>

  <!-- Tiny hinge details -->
  <circle cx="45" cy="74" r="1.5" fill="url(#gold)" stroke="#a07820" stroke-width="0.3"/>
  <circle cx="355" cy="74" r="1.5" fill="url(#gold)" stroke="#a07820" stroke-width="0.3"/>
</svg>