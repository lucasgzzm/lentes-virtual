<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Temple arms -->
  <line x1="58" y1="78" x2="15" y2="74" stroke="url(#frameGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="342" y1="78" x2="385" y2="74" stroke="url(#frameGrad)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Left lens (circle) -->
  <circle cx="125" cy="80" r="45" fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2.5" filter="url(#shadow)"/>
  
  <!-- Right lens (circle) -->
  <circle cx="275" cy="80" r="45" fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2.5" filter="url(#shadow)"/>
  
  <!-- Bridge -->
  <path d="M 170 75 Q 200 60 230 75" stroke="url(#frameGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose pads -->
  <ellipse cx="172" cy="88" rx="2.5" ry="3.5" fill="#4a4a4a"/>
  <ellipse cx="228" cy="88" rx="2.5" ry="3.5" fill="#4a4a4a"/>
  
  <!-- Lens reflection effect -->
  <path d="M 105 58 Q 115 52 125 58" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M 255 58 Q 265 52 275 58" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.25"/>
  
  <!-- Inner lens highlight -->
  <circle cx="125" cy="80" r="38" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <circle cx="275" cy="80" r="38" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Hinge details -->
  <circle cx="80" cy="78" r="2" fill="#5a5a5a"/>
  <circle cx="320" cy="78" r="2" fill="#5a5a5a"/>
</svg>