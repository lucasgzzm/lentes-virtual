<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <!-- Clear lens -->
    <linearGradient id="clearL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(220,225,230,0.08)"/>
      <stop offset="50%" stop-color="rgba(200,210,220,0.04)"/>
      <stop offset="100%" stop-color="rgba(220,225,230,0.08)"/>
    </linearGradient>
    <linearGradient id="clearR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(220,225,230,0.08)"/>
      <stop offset="50%" stop-color="rgba(200,210,220,0.04)"/>
      <stop offset="100%" stop-color="rgba(220,225,230,0.08)"/>
    </linearGradient>
    <!-- Dark matte frame -->
    <linearGradient id="matte" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="40%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <!-- Glare effect -->
    <radialGradient id="glareL" cx="35%" cy="30%" r="32%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glareR" cx="65%" cy="30%" r="32%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Subtle lens edge reflection -->
    <linearGradient id="edgeL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Left temple -->
  <path d="M44,74 L0,71" stroke="url(#matte)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M44,72 L0,69" stroke="rgba(70,70,70,0.3)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right temple -->
  <path d="M356,74 L400,71" stroke="url(#matte)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M356,72 L400,69" stroke="rgba(70,70,70,0.3)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Left lens - circle -->
  <circle cx="118" cy="82" r="48" fill="url(#clearL)" stroke="url(#matte)" stroke-width="3.5"/>
  <circle cx="118" cy="82" r="48" fill="url(#edgeL)"/>
  <circle cx="118" cy="82" r="48" fill="url(#glareL)"/>
  <ellipse cx="102" cy="66" rx="16" ry="7" fill="rgba(255,255,255,0.15)" transform="rotate(-10,102,66)"/>
  <ellipse cx="130" cy="100" rx="5" ry="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Lens rim highlight -->
  <circle cx="118" cy="82" r="48" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Right lens - circle -->
  <circle cx="282" cy="82" r="48" fill="url(#clearR)" stroke="url(#matte)" stroke-width="3.5"/>
  <circle cx="282" cy="82" r="48" fill="url(#edgeL)"/>
  <circle cx="282" cy="82" r="48" fill="url(#glareR)"/>
  <ellipse cx="292" cy="66" rx="16" ry="7" fill="rgba(255,255,255,0.15)" transform="rotate(10,292,66)"/>
  <ellipse cx="270" cy="100" rx="5" ry="3" fill="rgba(255,255,255,0.08)"/>
  <circle cx="282" cy="82" r="48" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Bridge -->
  <path d="M165,76 Q200,90 235,76" stroke="url(#matte)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Nose pads -->
  <ellipse cx="180" cy="92" rx="4" ry="6" fill="#333" stroke="#222" stroke-width="0.6"/>
  <ellipse cx="220" cy="92" rx="4" ry="6" fill="#333" stroke="#222" stroke-width="0.6"/>
  <!-- Nose pad arms -->
  <line x1="180" y1="86" x2="176" y2="78" stroke="url(#matte)" stroke-width="1.2"/>
  <line x1="220" y1="86" x2="224" y2="78" stroke="url(#matte)" stroke-width="1.2"/>
</svg>