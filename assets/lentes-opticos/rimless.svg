<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <!-- Almost invisible lens -->
    <linearGradient id="lensL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(230,235,240,0.04)"/>
      <stop offset="50%" stop-color="rgba(220,225,230,0.02)"/>
      <stop offset="100%" stop-color="rgba(230,235,240,0.04)"/>
    </linearGradient>
    <linearGradient id="lensR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(230,235,240,0.04)"/>
      <stop offset="50%" stop-color="rgba(220,225,230,0.02)"/>
      <stop offset="100%" stop-color="rgba(230,235,240,0.04)"/>
    </linearGradient>
    <!-- Very faint lens edge -->
    <linearGradient id="edgeL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(180,185,190,0.15)"/>
      <stop offset="100%" stop-color="rgba(180,185,190,0.08)"/>
    </linearGradient>
    <linearGradient id="edgeR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(180,185,190,0.15)"/>
      <stop offset="100%" stop-color="rgba(180,185,190,0.08)"/>
    </linearGradient>
    <!-- Thin metal bridge/pads -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <!-- Very subtle glare -->
    <radialGradient id="glareL" cx="35%" cy="30%" r="25%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glareR" cx="65%" cy="30%" r="25%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Temple arms (ultra-thin, barely visible) -->
  <path d="M44,72 L0,70" stroke="url(#silver)" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M356,72 L400,70" stroke="url(#silver)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Left lens (rimless - very faint edge) -->
  <ellipse cx="118" cy="80" rx="46" ry="38" fill="url(#lensL)"/>
  <ellipse cx="118" cy="80" rx="46" ry="38" fill="none" stroke="url(#edgeL)" stroke-width="0.5" stroke-dasharray="0.8,1.2"/>
  <ellipse cx="118" cy="80" rx="46" ry="38" fill="url(#glareL)"/>
  <ellipse cx="104" cy="68" rx="12" ry="5" fill="rgba(255,255,255,0.1)" transform="rotate(-6,104,68)"/>

  <!-- Right lens -->
  <ellipse cx="282" cy="80" rx="46" ry="38" fill="url(#lensR)"/>
  <ellipse cx="282" cy="80" rx="46" ry="38" fill="none" stroke="url(#edgeR)" stroke-width="0.5" stroke-dasharray="0.8,1.2"/>
  <ellipse cx="282" cy="80" rx="46" ry="38" fill="url(#glareR)"/>
  <ellipse cx="292" cy="68" rx="12" ry="5" fill="rgba(255,255,255,0.1)" transform="rotate(6,292,68)"/>

  <!-- Bridge (thin metal) -->
  <path d="M163,74 Q200,86 237,74" stroke="url(#silver)" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Lens mounting screws (tiny dots at top and bottom of each lens) -->
  <!-- Left lens screws -->
  <circle cx="118" cy="42" r="1.2" fill="url(#silver)" stroke="#888" stroke-width="0.3"/>
  <circle cx="118" cy="118" r="1.2" fill="url(#silver)" stroke="#888" stroke-width="0.3"/>
  <!-- Left lens screw arms (connecting to bridge/temple) -->
  <line x1="118" y1="42" x2="100" y2="56" stroke="url(#silver)" stroke-width="0.6"/>
  <line x1="118" y1="42" x2="160" y2="68" stroke="url(#silver)" stroke-width="0.6"/>
  <!-- Right lens screws -->
  <circle cx="282" cy="42" r="1.2" fill="url(#silver)" stroke="#888" stroke-width="0.3"/>
  <circle cx="282" cy="118" r="1.2" fill="url(#silver)" stroke="#888" stroke-width="0.3"/>
  <!-- Right lens screw arms -->
  <line x1="282" y1="42" x2="300" y2="56" stroke="url(#silver)" stroke-width="0.6"/>
  <line x1="282" y1="42" x2="240" y2="68" stroke="url(#silver)" stroke-width="0.6"/>

  <!-- Nose pads -->
  <ellipse cx="180" cy="88" rx="2" ry="3.5" fill="url(#silver)" stroke="#888" stroke-width="0.3"/>
  <ellipse cx="220" cy="88" rx="2" ry="3.5" fill="url(#silver)" stroke="#888" stroke-width="0.3"/>
  <!-- Nose pad arms -->
  <line x1="180" y1="84" x2="176" y2="76" stroke="url(#silver)" stroke-width="0.5"/>
  <line x1="220" y1="84" x2="224" y2="76" stroke="url(#silver)" stroke-width="0.5"/>
</svg>