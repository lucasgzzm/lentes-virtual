<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f8f8f8;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="50%" style="stop-color:#a8a8a8"/>
      <stop offset="100%" style="stop-color:#909090"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Temple arms -->
  <line x1="62" y1="78" x2="15" y2="74" stroke="url(#frameGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="338" y1="78" x2="385" y2="74" stroke="url(#frameGrad)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Left lens (minimal, almost invisible edges) -->
  <path d="M 70 55 Q 70 50 75 50 L 180 50 Q 185 50 185 55 L 185 105 Q 185 110 180 110 L 75 110 Q 70 110 70 105 Z" 
        fill="url(#lensGrad)" stroke="#e0e0e0" stroke-width="0.5" filter="url(#shadow)"/>
  
  <!-- Right lens (minimal, almost invisible edges) -->
  <path d="M 215 55 Q 215 50 220 50 L 325 50 Q 330 50 330 55 L 330 105 Q 330 110 325 110 L 220 110 Q 215 110 215 105 Z" 
        fill="url(#lensGrad)" stroke="#e0e0e0" stroke-width="0.5" filter="url(#shadow)"/>
  
  <!-- Bridge (main visible element) -->
  <path d="M 185 75 Q 200 65 215 75" stroke="url(#frameGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose pads -->
  <ellipse cx="183" cy="85" rx="2" ry="3" fill="#b0b0b0"/>
  <ellipse cx="217" cy="85" rx="2" ry="3" fill="#b0b0b0"/>
  
  <!-- Lens mounting points (small screws/dots) -->
  <circle cx="185" cy="78" r="1.5" fill="#a0a0a0"/>
  <circle cx="215" cy="78" r="1.5" fill="#a0a0a0"/>
  <circle cx="185" cy="98" r="1.5" fill="#a0a0a0"/>
  <circle cx="215" cy="98" r="1.5" fill="#a0a0a0"/>
  
  <!-- Temple arm connection points -->
  <circle cx="68" cy="78" r="2" fill="#b0b0b0"/>
  <circle cx="332" cy="78" r="2" fill="#b0b0b0"/>
  
  <!-- Lens edge highlights -->
  <path d="M 75 52 L 180 52" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <path d="M 220 52 L 325 52" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Temple arm tips -->
  <path d="M 15 74 Q 10 73 8 75" stroke="#b0b0b0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 385 74 Q 390 73 392 75" stroke="#b0b0b0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>